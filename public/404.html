<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Lift Tracker</title>
    <script>
      // GitHub Pages SPA shim: rewrite the 404 path into a query string
      // that index.html's inverse script unfurls back into history.
      // pathSegmentsToKeep = number of leading path segments belonging to the
      // hosting (1 for project pages like /lift-tracker/, 0 for user/org root pages).
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
